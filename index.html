<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>las Faz</title>
<meta name="description" content="las Faz — PESCANDO EN ALASKA. Escucha el álbum y compra merch oficial.">
<style>
  :root {
    --black: #000000;
    --white: #ffffff;
    --pad: clamp(20px, 4vw, 48px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { max-width: 100%; overflow-x: hidden; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.4;
  }

  /* Bloquea el scroll mientras la vista Home está activa (landing a pantalla completa) */
  body.no-scroll { overflow: hidden; }

  a { color: var(--black); text-decoration: none; }

  button {
    background: none; border: none; cursor: pointer;
    color: var(--black); font: inherit; display: inline-flex; align-items: center;
  }

  img { display: block; max-width: 100%; }

  /* ---------- Views ---------- */
  .view { display: none; }
  #shop.active { display: block; }

  /* ---------- HOME / Landing (no scroll) ---------- */
  #home {
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--pad);
    background: var(--white);
    z-index: 5;
  }
  #home.active { display: flex; }

  .home-nav {
    position: absolute;
    top: clamp(28px, 5vh, 56px);
    left: var(--pad);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .home-nav a {
    font-size: 15px;
    line-height: 1.6;
  }
  .home-nav a.current { text-decoration: underline; text-underline-offset: 3px; }
  .home-nav a:hover { opacity: 0.4; }

  .album-link {
    display: block;
    width: min(80vw, 80svh, 620px);
  }
  .album-link img {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  /* ---------- SHOP ---------- */
  .shop-header {
    position: sticky;
    top: 0;
    z-index: 6;
    background: var(--white);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 26px var(--pad);
  }
  .shop-logo {
    grid-column: 2;
    justify-self: center;
    font-family: "Times New Roman", Times, serif;
    font-size: 26px;
    letter-spacing: 0.01em;
  }
  .header-left  { grid-column: 1; justify-self: start; }
  .header-right {
    grid-column: 3;
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .header-right .icon:hover { opacity: 0.4; }
  .currency {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 15px;
  }
  .currency svg { width: 11px; height: 11px; }

  /* Grid de productos: centrado y "no estirado" con un solo item,
     listo para agregar más productos sin romper el layout. */
  .shop-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(28px, 4vw, 64px) clamp(24px, 3vw, 48px);
    max-width: 1180px;
    margin: 0 auto;
    padding: clamp(36px, 6vh, 72px) var(--pad) clamp(48px, 8vh, 80px);
  }
  .product {
    display: block;
    flex: 0 1 300px;     /* base fija: el item no se estira de ancho completo */
    max-width: 340px;
  }
  .product:hover { opacity: 0.7; }
  .product img {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }
  .product-name { margin-top: 16px; font-size: 15px; font-weight: 700; }
  .product-price { font-size: 15px; margin-top: 2px; }
  /* Elementos de confianza junto al producto */
  .product-secure { font-size: 12px; margin-top: 8px; opacity: 0.6; }
  .product-shipping { font-size: 12px; margin-top: 4px; opacity: 0.6; }

  /* ---------- Footer (solo Shop) ---------- */
  .shop-footer {
    border-top: 1px solid var(--black);
    padding: clamp(36px, 6vh, 56px) var(--pad);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }
  .footer-socials {
    display: flex;
    gap: 22px;
    align-items: center;
  }
  .footer-socials a { display: inline-flex; }
  .footer-socials a:hover { opacity: 0.4; }
  .footer-socials svg { width: 22px; height: 22px; }
  .footer-copy { font-size: 13px; }
  .footer-contact { font-size: 13px; }
  .footer-contact a { text-decoration: underline; text-underline-offset: 2px; }
  .footer-contact a:hover { opacity: 0.4; }

  /* ---------- Overlay menu ---------- */
  .menu {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: var(--white);
    display: none;
    flex-direction: column;
  }
  .menu.open { display: flex; }

  .menu-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 26px var(--pad);
  }
  .menu-header .shop-logo { grid-column: 2; }
  .menu-header .header-left  { grid-column: 1; justify-self: start; }
  .menu-header .header-right { grid-column: 3; justify-self: end; display: flex; align-items: center; gap: 22px; }

  .menu-links {
    padding: 0 var(--pad);
    margin-top: 8px;
  }
  .menu-links a {
    display: block;
    font-size: clamp(22px, 3vw, 30px);
    padding: 22px 0;
    border-bottom: 1px solid var(--black);
  }
  .menu-links a:first-child { border-top: 1px solid var(--black); }
  .menu-links a:hover { opacity: 0.4; }

  .menu-currency {
    padding: 26px var(--pad) 0;
  }
  .menu-currency .label {
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .menu-currency .value {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--black);
    padding: 14px 0;
    font-size: 22px;
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 640px) {
    .album-link { width: min(88vw, 70svh); }
    /* Grid del Shop a 2 columnas; con 1 solo producto se ve centrado */
    .product { flex: 0 1 calc(50% - 12px); max-width: none; }
  }
</style>
</head>
<body>

<!-- ============ HOME / LANDING ============ -->
<div id="home" class="view active" data-screen-label="Home">
  <nav class="home-nav">
    <a href="#" class="current" data-view="home">Home</a>
    <a href="#" data-view="shop">Shop</a>
  </nav>

  <!-- Portada del álbum: clickeable -> abre STREAMING_LINK en pestaña nueva.
       Reemplaza assets/album.jpg por la portada real de "PESCANDO EN ALASKA". -->
  <a class="album-link" id="album-link" href="#" target="_blank" rel="noopener">
    <img src="assets/album.jpg" alt="PESCANDO EN ALASKA — las Faz" width="620" height="620">
  </a>
</div>

<!-- ============ SHOP ============ -->
<div id="shop" class="view" data-screen-label="Shop">
  <header class="shop-header">
    <div class="header-left">
      <button class="menu-toggle" aria-label="Menú">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="3" y1="8" x2="23" y2="8"/><line x1="3" y1="13" x2="23" y2="13"/><line x1="3" y1="18" x2="23" y2="18"/>
        </svg>
      </button>
    </div>
    <a class="shop-logo" href="#" data-view="home">las Faz</a>
    <div class="header-right">
      <!-- Carrito: abre MERCADOPAGO_LINK en pestaña nueva (no hay carrito propio) -->
      <a class="icon icon-cart" id="cart-link" href="#" target="_blank" rel="noopener" aria-label="Comprar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
      </a>
      <span class="currency">MXN <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 4l4 4 4-4"/></svg></span>
    </div>
  </header>

  <div class="shop-grid">
    <!-- ÚNICO producto por ahora. Clic -> abre MERCADOPAGO_LINK en pestaña nueva.
         Para agregar más productos, duplica este bloque <a class="product">…</a>.
         Reemplaza assets/tshirt.jpg, el nombre y el precio. -->
    <a class="product product-buy" href="#" target="_blank" rel="noopener">
      <img src="assets/tshirt.jpg" alt="T-Shirt las Faz" width="340" height="340">
      <p class="product-name">T-Shirt</p>
      <p class="product-price">$000 MXN</p>
      <p class="product-secure">Pago seguro vía Mercado Pago</p>
      <p class="product-shipping">Envíos a todo México · 3-5 días hábiles</p>
    </a>
  </div>

  <!-- ============ FOOTER (solo Shop) ============ -->
  <footer class="shop-footer">
    <div class="footer-socials">
      <a id="social-instagram" href="#" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a id="social-tiktok" href="#" target="_blank" rel="noopener" aria-label="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.5 3.6 3.5 3.9V9.4c-1.3 0-2.5-.4-3.5-1.1v6.3c0 3.2-2.4 5.4-5.3 5.4-2.7 0-4.9-2-4.9-4.7 0-2.9 2.4-4.9 5.6-4.5v2.6c-.3-.1-.7-.2-1-.2-1.2 0-2.1.9-2.1 2.1 0 1.2 1 2.1 2.2 2.1 1.3 0 2.3-1 2.3-2.5V3h2.7z"/></svg>
      </a>
      <a id="social-youtube" href="#" target="_blank" rel="noopener" aria-label="YouTube">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 12c0-1.7-.2-3.4-.2-3.4s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C17.2 5.5 12 5.5 12 5.5s-5.2 0-8 .2c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S1 10.3 1 12v1.7c0 1.7.2 3.4.2 3.4s.2 1.4.8 2c.8.8 1.8.8 2.3.9 1.7.2 7.7.2 7.7.2s5.2 0 8-.2c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.7.2-3.4V12zM9.8 15.5v-6l5.2 3-5.2 3z"/></svg>
      </a>
      <a id="social-twitter" href="#" target="_blank" rel="noopener" aria-label="X (Twitter)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.2 3h3.3l-7.2 8.2L23 21h-6.6l-5.2-6.8L5.3 21H2l7.7-8.8L1.7 3h6.8l4.7 6.2L18.2 3zm-1.2 16h1.8L7.1 4.9H5.2L17 19z"/></svg>
      </a>
    </div>
    <p class="footer-copy">© 2026 las Faz</p>
    <!-- Email de contacto (mailto) -> CONTACT_EMAIL -->
    <p class="footer-contact">¿Dudas? <a id="contact-link" href="#">Escríbenos</a>.</p>
  </footer>
</div>

<!-- ============ OVERLAY MENU ============ -->
<div class="menu" id="menu" data-screen-label="Menu">
  <div class="menu-header">
    <div class="header-left">
      <button class="menu-close" aria-label="Cerrar">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="6" y1="6" x2="20" y2="20"/><line x1="20" y1="6" x2="6" y2="20"/>
        </svg>
      </button>
    </div>
    <a class="shop-logo" href="#" data-view="home">las Faz</a>
    <div class="header-right">
      <a class="icon" id="cart-link-menu" href="#" target="_blank" rel="noopener" aria-label="Comprar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
      </a>
      <span class="currency">MXN <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 4l4 4 4-4"/></svg></span>
    </div>
  </div>

  <nav class="menu-links">
    <a href="#" data-view="home">Home</a>
    <a href="#" data-view="shop">Shop</a>
  </nav>

  <div class="menu-currency">
    <p class="label">Currency</p>
    <div class="value">MXN <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 4l4 4 4-4"/></svg></div>
  </div>
</div>

<script>
  /* =====================================================================
     CONFIGURACIÓN EDITABLE — el dueño cambia SOLO estas constantes.
     ===================================================================== */

  // Link al álbum en plataformas de streaming (smart link de AWAL).
  // Se obtiene de la página de distribución del álbum.
  const STREAMING_LINK   = "https://awal.uk/pescandoenalaksa";

  // Link de pago de Mercado Pago. Se genera dentro de la app de Mercado Pago:
  // "Herramientas para vender" -> "Link de pago" -> crear link del producto y pegarlo aquí.
  const MERCADOPAGO_LINK = "PEGAR_AQUI_LINK_DE_PAGO";

  // Correo de contacto que se muestra en el footer (mailto). Cámbialo por el real.
  const CONTACT_EMAIL    = "correo@placeholder.com";

  // URLs de redes sociales. Reemplaza cada "#" por el perfil real.
  // (Se obtienen abriendo cada perfil y copiando la URL del navegador.)
  const SOCIALS = {
    instagram: "#",
    tiktok:    "#",
    youtube:   "#",
    twitter:   "#"   // X / Twitter
  };

  /* =====================================================================
     Aplica la configuración al DOM (no es necesario editar debajo).
     ===================================================================== */

  // Home: portada -> streaming
  document.getElementById('album-link').href = STREAMING_LINK;

  // Compra: producto + íconos de carrito -> Mercado Pago
  document.querySelectorAll('.product-buy, #cart-link, #cart-link-menu').forEach(el => {
    el.href = MERCADOPAGO_LINK;
  });

  // Contacto -> mailto
  const contact = document.getElementById('contact-link');
  contact.href = 'mailto:' + CONTACT_EMAIL;

  // Redes -> SOCIALS
  document.getElementById('social-instagram').href = SOCIALS.instagram;
  document.getElementById('social-tiktok').href    = SOCIALS.tiktok;
  document.getElementById('social-youtube').href   = SOCIALS.youtube;
  document.getElementById('social-twitter').href   = SOCIALS.twitter;

  /* =====================================================================
     Cambio de vista (Home <-> Shop) sin recargar.
     ===================================================================== */
  const menu = document.getElementById('menu');

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const target = document.getElementById(name);
    if (target) target.classList.add('active');
    menu.classList.remove('open');
    // En Home se bloquea el scroll (landing a pantalla completa); en Shop se permite.
    document.body.classList.toggle('no-scroll', name === 'home');
    window.scrollTo(0, 0);
  }

  document.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      showView(el.dataset.view);
    });
  });

  document.querySelector('.menu-toggle').addEventListener('click', () => menu.classList.add('open'));
  document.querySelector('.menu-close').addEventListener('click', () => menu.classList.remove('open'));

  // Estado inicial: Home activo -> scroll bloqueado.
  document.body.classList.add('no-scroll');
</script>

</body>
</html>
